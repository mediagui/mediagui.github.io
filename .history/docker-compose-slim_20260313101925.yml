# this file uses prebuilt image in dockerhub
services:
  jekyll:
    image: amirpourmand/al-folio:v0.16.3
    #build: .
    command: /srv/jekyll/bin/entry_point.sh
    ports:
      - 8080:8080
      - 35729:35729
    volumes:
      - .:/srv/jekyll:z
    environment:
      - JEKYLL_ENV=development
      - LISTEN_GEM_FORCE_POLLING=true
