      - company: InAtlas S.L.
        position: Senior Software Engineer
        location: Madrid, Spain (Remote 100%)
        start_date: 2023-12
        end_date: 2026-01
        summary: I have developed and evolved several REST based microservices and a monotlith which is being converted into other services, extracting the security core and other parts as the reporting logic. 
          I used to use sing Java 11/17, Spring Boot 2, PostgreSQL as database and Snowflake as datawarehouse. All of them deployed on an externalized AWS Cloud.
        highlights:
          - Evolving and maintaining GeoBiz platform.
          - Develop a GeoCRM platform, which is a CRM for the the defined industry areas for the GeoBiz platform, with a microservices architecture and an API first approach.
          - Data selling API, which is a microservice that provides an API to sell data to customers, with a microservices architecture and an API first approach. Using GraphQL as query language and Spring Boot 2 as framework.
          - Api Gateway, which is a microservice that will provide and check the authentication for the current and the future microservices, with a microservices architecture and an API first approach. Using Spring Boot 2 as framework and Keycloak as identity provider.

      
      - company: Neoris
        position: Technical Lead
        location: Madrid, Spain
        start_date: 2022-04
        end_date: 2023-12
        summary: Technical leadership of greenfield micro-services project for Zara. Responsible for architecture, technical guidance and mentoring of multidisciplinary team of 6 developers (2 interns). 
          In parallel, making evaluations and giving regular feedback to a group of 15+ people
        highlights:
          - Backlog management alongside the PO
          - Design and implementation of microservices using MVC and hexagonal architecture with DDD. 
          - Successful technical management of critical project for workshop operations (pressing, packaging).
          - CI/CD automation with Spinnaker and quality gates with SonarQube. 
          - Junior developers mentoring

      - company: Neoris
        position: Senior Consultant
        location: Madrid, Spain
        start_date: 2017-06
        end_date: 2023-12
        summary: Analysis, design and development in multidisciplinary agile team. Technical leadership in architecture of critical solutions for cash management and payments.
        highlights:
          - Log4Shell vulnerability mitigation (CVE-2021-44228). Implementation of temporary solution until 
            update to a secure version for all projects. Solution deployed to production in 1 day.
          - Real-time cypher/decypher database in replacement to Oracle Transpaent Data Encryption (Oracle TDE) to comply with 
            the Spanish LOPD.
          - Development of a Java library/maven dependency that centralises and automates prevention of critical vulnerabilities 
            (XSS, CSRF, SQL injection) in Java applications. 
          - LATAM payments platform integrated with 12+ banks (acceptance of cash, mixed and card payments). 
          - Cash order manager for Portugal (banking integration).
          - Smart Cash System. user/role/permission management for cash machines. Real-time REST encryption/decryption service 
            (performance-critical).
          - Secure reverse proxy (iframe replacement, XSS/CSRF/SQL Injection prevention). 
          - OAuth 2 implementation and Azure Cloud integration.
          - Mentoring in best development and unit testing practices

      - company: TCS (Tata Consultancy Services)
        position: Functional Analyst/Developer
        location: Madrid, Spain
        start_date: 2012
        end_date: 2017
        summary: Complete analysis, design and implementation of enterprise projects. Responsible for enhancements and maintenance of different projects.
        highlights:
          - Design and implementation of enterprise CI/CD system using Jenkins + SonarQube + Maven + Archiva + SVN
          - Complete architecture from taking requirements → use cases → design → implementation Security testing automation (OWASP ZED, Jenkins).
          - Monolithic intranet application security improvements XSS/CSRF/SQL Injection prevention

      - company: Madrid City Council (IT Department - IAM)
        position: Head of IT Division
        location: Madrid, Spain
        start_date: 2004
        end_date: 2012
        summary: In charge of the IT division of the Madrid City Council, responsible for the design and implementation of the IT strategy and architecture of the city council. Responsible for the management of a team of 20+ people. Responsible for the design and migration of legacy systems to modern Java and Spring architecture.
        highlights:
          - RPT Vista Software. Tool used search and query economic/professional data from 10,000+ employees (nowadays still in production). 
          - Legacy systems architecture migration from Visual Basic 6 to Java/Spring.
          - Linux servers administration Debian + Apache + MySQL.

      - company: Alfa Multimedia
        position: Functional Analyst/Developer
        location: Madrid, Spain
        start_date: 2000
        end_date: 2004
        summary: Analysis, development and implementation of medical management solutions. In charge of the network infrastructure of the company. Responsible for the design and implementation of the IT strategy and architecture of the company. Responsible for the management of a team of 5+ people. Responsible for the design and migration of legacy systems to modern Java and Spring architecture.
        highlights:
          - Medical office management software (GestMed). Deployed in 15+ clinics. Management software for Medical Associations from analysis to operational support. 
          - Ethernet infrastructure design and implementation.
          - Windows NT/2000 and Linux servers administration.

