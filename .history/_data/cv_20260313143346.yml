  summary: Software engineer with over 20 years of experience in Java (backend) development, specialized in Spring Boot and JPA/Hibernate, now also proficient in Golang and relational databases such as PostgreSQL, as well as cloud environments like Snowflake. I have designed and maintained high-performance REST APIs, complex integrations, and scalable architectures for demanding production environments. I enjoy optimizing and improving code quality while applying solid architectural best practices. I’m currently focused on backend development and architecture projects.

